name: Daily Research Sweep

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Bypass 24h skip check and force research'
        required: false
        type: boolean
        default: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run headless research
        env:
          EMAIL_HOOK: ${{ secrets.EMAIL_HOOK }}
          SLACK_HOOK: ${{ secrets.SLACK_HOOK }}
          BIN_ID: ${{ secrets.BIN_ID }}
          BIN_KEY: ${{ secrets.BIN_KEY }}
          FORCE_RUN: ${{ github.event.inputs.force_run }}
        run: npx playwright test --config=playwright-headless.config.ts

      - name: Upload screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot
          path: test-results/
